name: Deploy Cloudflare Worker
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Wrangler
        run: npm install -g @cloudflare/wrangler
      - name: Publish Worker
        env:
          CF_API_TOKEN: ${{ secrets.CF_PAGES_TOKEN }}
        run: wrangler publish
